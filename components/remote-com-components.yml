description: >-
  Remote's embeddable UI layer is the Remote Flows React SDK: drop-in employment
  flows mounted inside a <RemoteFlows> provider that handles auth and token
  management via a supplied auth() function. Fields are rendered from Remote's
  per-country JSON Schema forms (via @remoteoss/json-schema-form), styled with
  Tailwind, and validated with React Hook Form.
libraries:
